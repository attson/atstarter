name: build

on:
  push:
    tags: ['v*']
  pull_request:
    branches: [main, feature/*]
  workflow_dispatch:

concurrency:
  group: build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write # gh-release upload needs this when a tag triggers the workflow

env:
  GO_VERSION: '1.23.12'
  NODE_VERSION: '20'
  WAILS_VERSION: 'v2.12.0'
  APP_ARTIFACT_NAME: 'AT-Starter'

jobs:
  test:
    name: test
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: go.sum

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: install frontend deps
        working-directory: frontend
        run: npm ci

      # main.go has //go:embed all:frontend/dist — build the frontend before
      # any Go tooling touches the root package.
      - name: build frontend (populate embed target)
        working-directory: frontend
        run: npm run build

      - name: go test
        run: go test ./...

      - name: go test (runner race)
        run: go test -race ./internal/runner/

      - name: frontend tests
        run: |
          node --test frontend/src/projectTree.test.mjs
          node --test frontend/src/composables/useTheme.test.mjs

  build-linux:
    name: linux/${{ matrix.arch }}
    needs: test
    runs-on: ${{ matrix.runner }}
    environment: ${{ startsWith(github.ref, 'refs/tags/v') && 'prod' || '' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { arch: amd64, runner: ubuntu-24.04 }
          - { arch: arm64, runner: ubuntu-24.04-arm }
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: go.sum

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: install wails CLI
        run: |
          go install github.com/wailsapp/wails/v2/cmd/wails@${{ env.WAILS_VERSION }}
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: install frontend deps
        working-directory: frontend
        run: npm ci

      - name: build frontend (populate embed target)
        working-directory: frontend
        run: npm run build

      - name: prepare release metadata
        if: startsWith(github.ref, 'refs/tags/v')
        run: node .github/scripts/set-wails-version.mjs wails.json "${GITHUB_REF_NAME#v}"

      - name: build
        env:
          VERSION: ${{ github.ref_type == 'tag' && github.ref_name || 'dev' }}
          UPDATE_VERIFY_PUBLIC_KEY: ${{ secrets.ATSTARTER_UPDATE_VERIFY_PUBLIC_KEY }}
        run: |
          set -euo pipefail
          ldflags="-X main.Version=$VERSION"
          if [ -n "${UPDATE_VERIFY_PUBLIC_KEY:-}" ]; then
            ldflags="$ldflags -X main.UpdateVerifyPublicKey=$UPDATE_VERIFY_PUBLIC_KEY"
          fi
          wails build -tags webkit2_41 -platform linux/${{ matrix.arch }} -s -ldflags "$ldflags"

      - name: package tarball
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          set -euo pipefail
          cd build/bin
          tar -czf "AT-Starter-linux-${{ matrix.arch }}.tar.gz" "AT Starter"
          ls -la "AT-Starter-linux-${{ matrix.arch }}.tar.gz"

      - name: package deb
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          VERSION: ${{ github.ref_name }}
          ARCH: ${{ matrix.arch }}
          ARTIFACT_NAME: ${{ env.APP_ARTIFACT_NAME }}
        run: .github/scripts/package-linux-deb.sh

      - uses: actions/upload-artifact@v4
        if: startsWith(github.ref, 'refs/tags/v')
        with:
          name: AT-Starter-linux-${{ matrix.arch }}
          path: |
            build/bin/${{ env.APP_ARTIFACT_NAME }}_*_${{ matrix.arch }}.deb
            build/bin/AT-Starter-linux-${{ matrix.arch }}.tar.gz
          if-no-files-found: error

  build-darwin:
    name: darwin/${{ matrix.arch }}
    needs: test
    runs-on: ${{ matrix.runner }}
    environment: ${{ startsWith(github.ref, 'refs/tags/v') && 'prod' || '' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { arch: arm64, runner: macos-15 }
          - { arch: amd64, runner: macos-15-intel }
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: go.sum

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: install wails CLI
        run: |
          go install github.com/wailsapp/wails/v2/cmd/wails@${{ env.WAILS_VERSION }}
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: install frontend deps
        working-directory: frontend
        run: npm ci

      - name: build frontend
        working-directory: frontend
        run: npm run build

      - name: prepare release metadata
        if: startsWith(github.ref, 'refs/tags/v')
        run: node .github/scripts/set-wails-version.mjs wails.json "${GITHUB_REF_NAME#v}"

      - name: build
        env:
          VERSION: ${{ github.ref_type == 'tag' && github.ref_name || 'dev' }}
          UPDATE_VERIFY_PUBLIC_KEY: ${{ secrets.ATSTARTER_UPDATE_VERIFY_PUBLIC_KEY }}
        run: |
          set -euo pipefail
          ldflags="-X main.Version=$VERSION"
          if [ -n "${UPDATE_VERIFY_PUBLIC_KEY:-}" ]; then
            ldflags="$ldflags -X main.UpdateVerifyPublicKey=$UPDATE_VERIFY_PUBLIC_KEY"
          fi
          wails build -platform darwin/${{ matrix.arch }} -s -ldflags "$ldflags"

      - name: package .app zip
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          set -euo pipefail
          cd build/bin
          # Wails names the bundle after wails.json:name (atstarter). Copy to the
          # user-facing product name before archiving so /Applications shows
          # "AT Starter" both in Finder and via `ls`.
          if [ ! -d "AT Starter.app" ]; then
            cp -R atstarter.app "AT Starter.app"
          fi
          ditto -c -k --keepParent "AT Starter.app" "AT-Starter-darwin-${{ matrix.arch }}.zip"
          ls -la "AT-Starter-darwin-${{ matrix.arch }}.zip"

      - name: package dmg
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          VERSION: ${{ github.ref_name }}
          ARCH: ${{ matrix.arch }}
          ARTIFACT_NAME: ${{ env.APP_ARTIFACT_NAME }}
        run: .github/scripts/package-macos-dmg.sh

      - uses: actions/upload-artifact@v4
        if: startsWith(github.ref, 'refs/tags/v')
        with:
          name: AT-Starter-darwin-${{ matrix.arch }}
          path: |
            build/bin/${{ env.APP_ARTIFACT_NAME }}_*_${{ matrix.arch }}.dmg
            build/bin/AT-Starter-darwin-${{ matrix.arch }}.zip
          if-no-files-found: error

  build-windows:
    name: windows/amd64
    needs: test
    runs-on: windows-2022
    environment: ${{ startsWith(github.ref, 'refs/tags/v') && 'prod' || '' }}
    defaults:
      run:
        shell: bash # Git Bash so recipes match the unix jobs
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: go.sum

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: install NSIS
        run: |
          choco install nsis -y --no-progress
          echo "C:\\Program Files (x86)\\NSIS" >> "$GITHUB_PATH"

      - name: install wails CLI
        run: |
          go install github.com/wailsapp/wails/v2/cmd/wails@${{ env.WAILS_VERSION }}
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: install frontend deps
        working-directory: frontend
        run: npm ci

      - name: build frontend
        working-directory: frontend
        run: npm run build

      - name: prepare release metadata
        if: startsWith(github.ref, 'refs/tags/v')
        run: node .github/scripts/set-wails-version.mjs wails.json "${GITHUB_REF_NAME#v}"

      - name: build NSIS installer
        env:
          VERSION: ${{ github.ref_type == 'tag' && github.ref_name || 'dev' }}
          UPDATE_VERIFY_PUBLIC_KEY: ${{ secrets.ATSTARTER_UPDATE_VERIFY_PUBLIC_KEY }}
        run: |
          set -euo pipefail
          ldflags="-X main.Version=$VERSION"
          if [ -n "${UPDATE_VERIFY_PUBLIC_KEY:-}" ]; then
            ldflags="$ldflags -X main.UpdateVerifyPublicKey=$UPDATE_VERIFY_PUBLIC_KEY"
          fi
          wails build -platform windows/amd64 -nsis -s -ldflags "$ldflags"

      - name: package .exe zip
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          set -euo pipefail
          cd build/bin
          test -f "AT Starter.exe"
          7z a "AT-Starter-windows-amd64.zip" "AT Starter.exe"
          ls -la "AT-Starter-windows-amd64.zip"

      - name: rename installer
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          VERSION: ${{ github.ref_name }}
          ARTIFACT_NAME: ${{ env.APP_ARTIFACT_NAME }}
        run: |
          set -euo pipefail
          version_no_v="${VERSION#v}"
          src=""
          # NSIS names the installer after wails.json:name (atstarter);
          # cover a few plausible variants in case that changes.
          for candidate in \
            "build/bin/atstarter-amd64-installer.exe" \
            "build/bin/AT Starter-amd64-installer.exe" \
            "build/bin/at-starter-amd64-installer.exe"; do
            if [ -f "$candidate" ]; then
              src="$candidate"
              break
            fi
          done
          if [ -z "$src" ]; then
            echo "windows installer not found; listing build/bin"
            ls -la build/bin
            exit 1
          fi
          dst="build/bin/${ARTIFACT_NAME}_${version_no_v}_amd64.exe"
          mv "$src" "$dst"
          ls -la "$dst"

      - uses: actions/upload-artifact@v4
        if: startsWith(github.ref, 'refs/tags/v')
        with:
          name: AT-Starter-windows-amd64
          path: |
            build/bin/${{ env.APP_ARTIFACT_NAME }}_*_amd64.exe
            build/bin/AT-Starter-windows-amd64.zip
          if-no-files-found: error

  release:
    name: release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-linux, build-darwin, build-windows]
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: sign checksums
        env:
          ATSTARTER_UPDATE_SIGNING_PRIVATE_KEY: ${{ secrets.ATSTARTER_UPDATE_SIGNING_PRIVATE_KEY }}
        run: go run .github/scripts/sign-release-checksums.go artifacts

      - name: list
        run: find artifacts -type f | sort

      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
